name: Build client

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GUI test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgl1-mesa-dev xorg-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev libasound2-dev mesa-common-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify modules
        run: |
          go mod download
          go mod verify

      - name: Run tests
        run: go test ./...

  build-headless:
    needs: test
    name: headless-${{ matrix.name }}-${{ matrix.language }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-amd64, runs_on: ubuntu-latest, goos: linux, goarch: amd64, goarm: "", ext: "", language: de }
          - { name: linux-amd64, runs_on: ubuntu-latest, goos: linux, goarch: amd64, goarm: "", ext: "", language: en }
          - { name: linux-arm64, runs_on: ubuntu-latest, goos: linux, goarch: arm64, goarm: "", ext: "", language: de }
          - { name: linux-arm64, runs_on: ubuntu-latest, goos: linux, goarch: arm64, goarm: "", ext: "", language: en }
          - { name: linux-armv7, runs_on: ubuntu-latest, goos: linux, goarch: arm, goarm: "7", ext: "", language: de }
          - { name: linux-armv7, runs_on: ubuntu-latest, goos: linux, goarch: arm, goarm: "7", ext: "", language: en }
          - { name: windows-amd64, runs_on: windows-latest, goos: windows, goarch: amd64, goarm: "", ext: ".exe", language: de }
          - { name: windows-amd64, runs_on: windows-latest, goos: windows, goarch: amd64, goarm: "", ext: ".exe", language: en }
          - { name: windows-386, runs_on: windows-latest, goos: windows, goarch: "386", goarm: "", ext: ".exe", language: de }
          - { name: windows-386, runs_on: windows-latest, goos: windows, goarch: "386", goarm: "", ext: ".exe", language: en }
          - { name: macos-intel, runs_on: macos-15-intel, goos: darwin, goarch: amd64, goarm: "", ext: "", language: de }
          - { name: macos-intel, runs_on: macos-15-intel, goos: darwin, goarch: amd64, goarm: "", ext: "", language: en }
          - { name: macos-arm64, runs_on: macos-latest, goos: darwin, goarch: arm64, goarm: "", ext: "", language: de }
          - { name: macos-arm64, runs_on: macos-latest, goos: darwin, goarch: arm64, goarm: "", ext: "", language: en }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download modules
        run: |
          go mod download
          go mod verify

      - name: Build headless
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_COMMIT="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          BUILD_ARCH="${{ matrix.goarch }}"
          if [ "${{ matrix.goarch }}" = "arm" ] && [ "${{ matrix.goarm }}" = "7" ]; then BUILD_ARCH="armv7"; fi
          OUT="dist/${{ matrix.name }}-${{ matrix.language }}"
          mkdir -p "$OUT"
          LDFLAGS="-s -w -X github.com/autofetch-de/autofetch-client/internal/buildinfo.Version=${VERSION} -X github.com/autofetch-de/autofetch-client/internal/buildinfo.BuildCommit=${BUILD_COMMIT} -X github.com/autofetch-de/autofetch-client/internal/buildinfo.BuildDate=${BUILD_DATE} -X github.com/autofetch-de/autofetch-client/internal/buildinfo.Variant=headless -X github.com/autofetch-de/autofetch-client/internal/buildinfo.Language=${{ matrix.language }} -X github.com/autofetch-de/autofetch-client/internal/buildinfo.Platform=${{ matrix.goos }} -X github.com/autofetch-de/autofetch-client/internal/buildinfo.Arch=${BUILD_ARCH}"

          export CGO_ENABLED=0
          export GOOS="${{ matrix.goos }}"
          export GOARCH="${{ matrix.goarch }}"
          if [ -n "${{ matrix.goarm }}" ]; then export GOARM="${{ matrix.goarm }}"; fi

          go build -trimpath -ldflags "$LDFLAGS" \
            -o "$OUT/autofetch-${{ matrix.language }}${{ matrix.ext }}" \
            ./cmd/autofetch

      - name: Verify binary metadata
        shell: bash
        run: |
          set -euo pipefail
          BINARY="dist/${{ matrix.name }}-${{ matrix.language }}/autofetch-${{ matrix.language }}${{ matrix.ext }}"
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_COMMIT="${GITHUB_SHA::7}"
          BUILD_ARCH="${{ matrix.goarch }}"
          if [ "${{ matrix.goarch }}" = "arm" ] && [ "${{ matrix.goarm }}" = "7" ]; then BUILD_ARCH="armv7"; fi
          file "$BINARY" || true
          go version -m "$BINARY"

          case "${{ matrix.name }}" in
            linux-amd64|windows-amd64|windows-386|macos-intel|macos-arm64)
              VERSION_OUTPUT="$("$BINARY" --version)"
              echo "$VERSION_OUTPUT"
              echo "$VERSION_OUTPUT" | grep -Fx "autofetch ${VERSION}"
              echo "$VERSION_OUTPUT" | grep -Fx "commit ${BUILD_COMMIT}"
              echo "$VERSION_OUTPUT" | grep -Fx "${{ matrix.goos }}/${BUILD_ARCH}"
              echo "$VERSION_OUTPUT" | grep -Fx "headless"
              echo "$VERSION_OUTPUT" | grep -Fx "language ${{ matrix.language }}"
              if echo "$VERSION_OUTPUT" | grep -Eq '(^| )(dev|unknown)($| )'; then exit 1; fi
              ;;
            *)
              strings "$BINARY" | grep -F -- "${VERSION}" >/dev/null
              strings "$BINARY" | grep -F -- "${BUILD_COMMIT}" >/dev/null
              strings "$BINARY" | grep -F -- "language=${{ matrix.language }}" >/dev/null || \
                strings "$BINARY" | grep -F -- "language ${{ matrix.language }}" >/dev/null
              ;;
          esac

      - name: Generate SHA256
        shell: bash
        run: |
          cd "dist/${{ matrix.name }}-${{ matrix.language }}"
          for f in *; do
            [ -f "$f" ] || continue
            if command -v sha256sum >/dev/null 2>&1; then sha256sum "$f" > "$f.sha256"; else shasum -a 256 "$f" > "$f.sha256"; fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: headless-${{ matrix.name }}-${{ matrix.language }}
          path: dist/${{ matrix.name }}-${{ matrix.language }}/

  build-gui:
    needs: test
    name: gui-${{ matrix.name }}-${{ matrix.language }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-amd64, runs_on: ubuntu-latest, goos: linux, goarch: amd64, ext: "", language: de, cc: gcc }
          - { name: linux-amd64, runs_on: ubuntu-latest, goos: linux, goarch: amd64, ext: "", language: en, cc: gcc }
          - { name: windows-amd64, runs_on: windows-latest, goos: windows, goarch: amd64, ext: ".exe", language: de, cc: x86_64-w64-mingw32-gcc }
          - { name: windows-amd64, runs_on: windows-latest, goos: windows, goarch: amd64, ext: ".exe", language: en, cc: x86_64-w64-mingw32-gcc }
          - { name: macos-intel, runs_on: macos-15-intel, goos: darwin, goarch: amd64, ext: "", language: de, cc: clang }
          - { name: macos-intel, runs_on: macos-15-intel, goos: darwin, goarch: amd64, ext: "", language: en, cc: clang }
          - { name: macos-arm64, runs_on: macos-latest, goos: darwin, goarch: arm64, ext: "", language: de, cc: clang }
          - { name: macos-arm64, runs_on: macos-latest, goos: darwin, goarch: arm64, ext: "", language: en, cc: clang }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux GUI dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgl1-mesa-dev xorg-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev libasound2-dev mesa-common-dev

      - name: Setup MSYS2
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Fyne CLI
        if: matrix.goos == 'darwin'
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Download modules
        shell: bash
        run: |
          go mod download
          go mod verify

      - name: Build GUI
        shell: bash
        env:
          CC: ${{ matrix.cc }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_COMMIT="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          OUT="dist/${{ matrix.name }}-gui-${{ matrix.language }}"
          mkdir -p "$OUT"
          LDFLAGS="-s -w -X github.com/autofetch-de/autofetch-client/internal/buildinfo.Version=${VERSION} -X github.com/autofetch-de/autofetch-client/internal/buildinfo.BuildCommit=${BUILD_COMMIT} -X github.com/autofetch-de/autofetch-client/internal/buildinfo.BuildDate=${BUILD_DATE} -X github.com/autofetch-de/autofetch-client/internal/buildinfo.Variant=gui -X github.com/autofetch-de/autofetch-client/internal/buildinfo.Language=${{ matrix.language }} -X github.com/autofetch-de/autofetch-client/internal/buildinfo.Platform=${{ matrix.goos }} -X github.com/autofetch-de/autofetch-client/internal/buildinfo.Arch=${{ matrix.goarch }}"

          export CGO_ENABLED=1
          export GOOS="${{ matrix.goos }}"
          export GOARCH="${{ matrix.goarch }}"
          go build -trimpath -ldflags "$LDFLAGS" \
            -o "$OUT/autofetch-gui-${{ matrix.language }}${{ matrix.ext }}" \
            ./cmd/autofetch-gui

      - name: Package macOS app
        if: matrix.goos == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$(go env GOPATH)/bin:$PATH"
          OUT="dist/${{ matrix.name }}-gui-${{ matrix.language }}"
          cd cmd/autofetch-gui
          if [ -f ../../Icon.png ]; then fyne package -os darwin -name autofetch -release -icon ../../Icon.png; else fyne package -os darwin -name autofetch -release; fi
          cp "../../$OUT/autofetch-gui-${{ matrix.language }}" autofetch.app/Contents/MacOS/autofetch
          mv autofetch.app "../../$OUT/autofetch-${{ matrix.language }}.app"
          cd "../../$OUT"
          ditto -c -k --sequesterRsrc --keepParent "autofetch-${{ matrix.language }}.app" "autofetch-${{ matrix.name }}-${{ matrix.language }}-app.zip"

      - name: Verify binary metadata
        shell: bash
        run: |
          set -euo pipefail
          BINARY="dist/${{ matrix.name }}-gui-${{ matrix.language }}/autofetch-gui-${{ matrix.language }}${{ matrix.ext }}"
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_COMMIT="${GITHUB_SHA::7}"
          file "$BINARY" || true
          go version -m "$BINARY"
          VERSION_OUTPUT="$("$BINARY" --version)"
          echo "$VERSION_OUTPUT"
          echo "$VERSION_OUTPUT" | grep -Fx "autofetch ${VERSION}"
          echo "$VERSION_OUTPUT" | grep -Fx "commit ${BUILD_COMMIT}"
          echo "$VERSION_OUTPUT" | grep -Fx "${{ matrix.goos }}/${{ matrix.goarch }}"
          echo "$VERSION_OUTPUT" | grep -Fx "gui"
          echo "$VERSION_OUTPUT" | grep -Fx "language ${{ matrix.language }}"
          if echo "$VERSION_OUTPUT" | grep -Eq '(^| )(dev|unknown)($| )'; then exit 1; fi

      - name: Generate SHA256
        shell: bash
        run: |
          cd "dist/${{ matrix.name }}-gui-${{ matrix.language }}"
          for f in *; do
            [ -f "$f" ] || continue
            if command -v sha256sum >/dev/null 2>&1; then sha256sum "$f" > "$f.sha256"; else shasum -a 256 "$f" > "$f.sha256"; fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.name }}-${{ matrix.language }}
          path: dist/${{ matrix.name }}-gui-${{ matrix.language }}/

  release:
    name: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-headless
      - build-gui
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p release
          for LANG in de en; do
            cp "artifacts/gui-linux-amd64-${LANG}/autofetch-gui-${LANG}" "release/autofetch-gui-linux-amd64-${LANG}-${VERSION}"
            cp "artifacts/gui-windows-amd64-${LANG}/autofetch-gui-${LANG}.exe" "release/autofetch-gui-windows-amd64-${LANG}-${VERSION}.exe"
            cp "artifacts/gui-macos-intel-${LANG}/autofetch-macos-intel-${LANG}-app.zip" "release/autofetch-gui-macos-intel-${LANG}-${VERSION}.zip"
            cp "artifacts/gui-macos-arm64-${LANG}/autofetch-macos-arm64-${LANG}-app.zip" "release/autofetch-gui-macos-arm64-${LANG}-${VERSION}.zip"

            cp "artifacts/headless-linux-amd64-${LANG}/autofetch-${LANG}" "release/autofetch-headless-linux-amd64-${LANG}-${VERSION}"
            cp "artifacts/headless-linux-arm64-${LANG}/autofetch-${LANG}" "release/autofetch-headless-linux-arm64-${LANG}-${VERSION}"
            cp "artifacts/headless-linux-armv7-${LANG}/autofetch-${LANG}" "release/autofetch-headless-linux-armv7-${LANG}-${VERSION}"
            cp "artifacts/headless-windows-amd64-${LANG}/autofetch-${LANG}.exe" "release/autofetch-headless-windows-amd64-${LANG}-${VERSION}.exe"
            cp "artifacts/headless-windows-386-${LANG}/autofetch-${LANG}.exe" "release/autofetch-headless-windows-386-${LANG}-${VERSION}.exe"
            cp "artifacts/headless-macos-intel-${LANG}/autofetch-${LANG}" "release/autofetch-headless-macos-intel-${LANG}-${VERSION}"
            cp "artifacts/headless-macos-arm64-${LANG}/autofetch-${LANG}" "release/autofetch-headless-macos-arm64-${LANG}-${VERSION}"
          done

          git archive --format=zip --output "release/autofetch-client-source-${VERSION}.zip" HEAD
          cd release
          for f in *; do [ -f "$f" ] || continue; sha256sum "$f" > "$f.sha256"; done

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: autofetch client ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/*
